<!doctype html>
<html>
  <head>
    <title>Lesson 2</title>
    <meta charset="UTF-8" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form id="form">
      <h1>Contact Form</h1>
      <label>Name:</label><br />
      <input type="text" placeholder="Enter name" id="name" /><br />
      <label>Email:</label><br />
      <input type="email" placeholder="Enter email" id="email" /><br />
      <label>Age:</label><br />
      <input type="number" placeholder="Enter age" id="age" /><br />
      <label>Message:</label><br />
      <textarea
        name="message"
        placeholder="Enter your message"
        id="message"
      ></textarea
      ><br />
      <p id="char">Characters:<span id="charCount">0 </span></p>
      <label>Choose a language:</label><br />
      <select id="language">
        <option value="" selected disabled>choose</option>
        <option value="Java">Java</option>
        <option value="JavaScript">JavaScript</option>
        <option value="Python">Python</option>
        <option value="C++">C++</option>
      </select>
      <p id="errorMsg"></p>
      <button type="submit">Submit</button>
    </form>
    <p id="successMsg"></p>
    <script src="script.js"></script>
  </body>
</html>
